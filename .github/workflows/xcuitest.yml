name: XCUITest

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 2 * * 5,6,0'  # Run at 2 AM UTC on Friday, Saturday, Sunday (weekends only)

jobs:
  test-ios:
    name: Run XCUITests on iOS
    uses: ./.github/workflows/build.yml
    with:
      test-target: fieldnoteUITests
      enable-coverage: false
      simulator: 'iPhone 17 Pro'
      pre-boot-simulator: true
