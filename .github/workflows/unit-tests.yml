name: Unit Tests

on:
  workflow_dispatch:  # Manual trigger
  pull_request:
    branches: [ main, develop ]
  # Push trigger removed - pre-push hook handles local validation

jobs:
  test:
    name: Run Unit Tests
    uses: ./.github/workflows/build.yml
    with:
      test-target: EcoJournalTests
      enable-coverage: true
      simulator: 'iPhone 17 Pro'
      pre-boot-simulator: false
