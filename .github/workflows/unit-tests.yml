name: Unit Tests

on:
  workflow_dispatch:  # Manual trigger
  pull_request:
    branches: [ main, develop ]
  # Push trigger removed - pre-push hook handles local validation

jobs:
  test:
    name: Run Unit Tests
    runs-on: macos-26  # macOS with Xcode 26.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project fieldnote.xcodeproj \
            -scheme fieldnote \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -only-testing:fieldnoteTests \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            2>&1 | tee xcodebuild.log

      - name: Generate code coverage report
        if: always()
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            TestResults.xcresult
            xcodebuild.log
            coverage.json

      - name: Check test results
        if: always()
        run: |
          if grep -q "Test Suite.*failed" xcodebuild.log; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi
