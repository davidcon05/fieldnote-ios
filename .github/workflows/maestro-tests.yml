name: Maestro UI Tests

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - 'fieldnote/**'
      - '.maestro/**'
      - '.github/workflows/maestro-tests.yml'

jobs:
  test-ios:
    name: Run Maestro Tests on iOS
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app for testing
        run: |
          xcodebuild \
            -project fieldnote.xcodeproj \
            -scheme fieldnote \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            build

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 15 Pro" || echo "Simulator already booted"
          xcrun simctl list devices | grep "iPhone 15 Pro"

      - name: Run Maestro Tests
        run: |
          maestro test \
            --app build/Build/Products/Debug-iphonesimulator/fieldnote.app \
            --format junit \
            --output maestro-results.xml \
            .maestro/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-results.xml
            ~/.maestro/tests/

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        with:
          files: maestro-results.xml
          check_name: Maestro Test Results
