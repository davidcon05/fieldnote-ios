# Test search functionality
appId: com.davidcon.fieldnote
---
- launchApp:
    clearState: true

# Create a journal to search for
- tapOn: "New Journal"
- tapOn: "Enter name"
- inputText: "Search Test Journal"
- tapOn: "Create"
- assertVisible: "Journals"

# Test search functionality
- tapOn: "Search Journals..."
- inputText: "Search"

# Should show the journal we created
- assertVisible: "Search Test Journal"
