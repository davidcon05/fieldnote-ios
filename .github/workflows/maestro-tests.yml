name: Maestro UI Tests

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - 'fieldnote/**'
      - '.maestro/**'
      - '.github/workflows/maestro-tests.yml'

jobs:
  test-ios:
    name: Run Maestro Tests on iOS
    runs-on: macos-15  # Free tier - macOS Sequoia with Xcode 16.x (iOS 18.2+)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app for testing
        run: |
          xcodebuild \
            -project fieldnote.xcodeproj \
            -scheme fieldnote \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            build

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: List Available Simulators
        run: |
          echo "Available iOS Simulators:"
          xcrun simctl list devices available --json | jq -r '.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | select(.isAvailable == true) | "\(.name) (\(.udid))"'

      - name: Boot iOS Simulator
        run: |
          # Try to find iPhone 15 Pro first, then fallback to any iPhone 15 or iPhone 16
          DEVICE_UDID=$(xcrun simctl list devices available --json | jq -r '
            .devices |
            to_entries[] |
            select(.key | contains("iOS")) |
            .value[] |
            select(.isAvailable == true) |
            select(.name | test("iPhone (1[56]|15 Pro|16 Pro?)")) |
            .udid' | head -n 1)

          if [ -z "$DEVICE_UDID" ]; then
            echo "Error: No suitable iPhone simulator found"
            echo "Available devices:"
            xcrun simctl list devices available
            exit 1
          fi

          DEVICE_NAME=$(xcrun simctl list devices --json | jq -r ".devices | .[] | .[] | select(.udid == \"$DEVICE_UDID\") | .name")
          echo "Using device: $DEVICE_NAME ($DEVICE_UDID)"
          echo "SIMULATOR_UDID=$DEVICE_UDID" >> $GITHUB_ENV
          echo "SIMULATOR_NAME=$DEVICE_NAME" >> $GITHUB_ENV

          # Boot the simulator
          xcrun simctl boot "$DEVICE_UDID" || echo "Simulator already booted"

          # Wait for simulator to be ready
          xcrun simctl bootstatus "$DEVICE_UDID"

      - name: Verify Maestro Setup
        run: |
          echo "Maestro version:"
          maestro --version
          echo ""
          echo "Maestro can see these devices:"
          maestro test --help || true
          echo ""
          echo "Simulator status:"
          xcrun simctl list devices | grep Booted

      - name: Install App on Simulator
        run: |
          # Install the app on the booted simulator
          xcrun simctl install "$SIMULATOR_UDID" build/Build/Products/Debug-iphonesimulator/fieldnote.app
          echo "App installed successfully"

      - name: Run Maestro Tests
        run: |
          # Run Maestro tests on iOS platform - it will use the appId from the test files
          maestro test \
            --platform ios \
            --format junit \
            --output maestro-results.xml \
            .maestro/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-results.xml
            ~/.maestro/tests/

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        with:
          files: maestro-results.xml
          check_name: Maestro Test Results
