name: XCUITest

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - 'fieldnote/**'
      - 'fieldnoteUITests/**'
      - '.github/workflows/xcuitest.yml'

jobs:
  test-ios:
    name: Run XCUITests on iOS
    runs-on: macos-15  # Free tier - macOS Sequoia with Xcode 16.x (iOS 18.2+)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run XCUITests
        run: |
          xcodebuild test \
            -project fieldnote.xcodeproj \
            -scheme fieldnote \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -only-testing:fieldnoteUITests \
            -resultBundlePath TestResults.xcresult \
            -verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcuitest-results
          path: TestResults.xcresult
